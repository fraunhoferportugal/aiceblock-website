title: "Conformidade simplificada: para quem é o aiceblock?"
subtitle: O aiceblock foi concebido para organizações que desenvolvem ou utilizam sistemas de IA, incluindo equipas de compliance, empresas e entidades públicas.

benefits:
  - title: Equipas de Compliance e Governação
    subtitle: Simplifique a conformidade e reduza custos
    description: Preparar e manter documentação auditável alinhada com o AI Act.
    image:
      src: /assets/images/benefits/benefit-1.svg
      alt: Ilustração representando conformidade da Inteligência Artificial. CIOs.

  - title: Setor Público e Organizações Reguladas
    subtitle: Reforce a confiança do público e assegure eficiência
    description: Assegurar transparência, rastreabilidade e accountability na utilização de sistemas de IA.
    image:
      src: /assets/images/benefits/benefit-2.svg
      alt: Ilustração representando segurança de dados e confiança na Inteligência Artificial. Setor Público. Alto Risco.

  - title: Organizações que utilizam IA
    subtitle: Aumente a eficiência e minimize erros
    description: Manter um inventário claro e documentação estruturada dos sistemas de IA.
    image:
      src: /assets/images/benefits/benefit-3.svg
      alt: Ilustração representando desenvolvimento eficiente de Inteligência Artificial.
