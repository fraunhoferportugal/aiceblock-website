title: AICeBlock evolui como um sistema modular.
subtitle: A versão atual (MVP) disponibiliza as capacidades base de gestão da conformidade, enquanto módulos adicionais irão reforçar progressivamente a automação, rastreabilidade e auditabilidade ao longo do ciclo de vida da IA.

cta_button:
  text: Discuta o seu caso de uso de IA
  url: /about?subject=0#contacts
  icon:
    src: /assets/images/icons/arrow-icon.svg
    alt: Ícone de Seta

sections:
  - title: Âmbito e Risco
    subtitle: Da classificação estruturada à orquestração regulatória inteligente.
    image:
      src: /assets/images/roadmap/scope-and-risk.svg
      alt: Ilustração da secção sobre âmbito e riscos
    roadmap:
      - index: Agora
        title: Ponto de entrada estruturado para a conformidade com o AI Act.
        description: |
          • Registo de múltiplos sistemas de IA
          • Determinação de exposição ao AI Act
          • Classificação de risco baseada em RAG
          • Motor de classificação baseado em regras
          • Mapeamento de obrigações por perfil
          • Relatório exportável de Âmbito e Risco
      - index: A Seguir
        title: Maior robustez regulatória e determinismo.
        description: |
          • Lógica condicional de obrigações
          • Maior transparência na explicação
          • Mapeamento de dependências melhorado
          • Integração com outros enquadramentos (ex.: GDPR)
      - index: Para Além
        title: Orquestração regulatória inteligente.
        description: |
          • Planeamento avançado de mitigação
          • Perfis de conformidade ao nível da organização
          • Apoio assistido por IA (LLM privado/local)

  - title: Desenvolver e Implementar
    subtitle: Da documentação estruturada à conformidade integrada no desenvolvimento.
    image:
      src: /assets/images/roadmap/build-and-implement.svg
      alt: Ilustração da secção sobre desenvolvimento e implementação
    roadmap:
      - index: Agora
        title: Documentação estruturada de compliance-by-design.
        description: |
          • Checklists por obrigação
          • Templates (Annex IV, DPIA, FRIA)
          • Upload de documentos por obrigação
          • Dashboard de estado/progresso
          • Integração com artefactos de desenvolvimento
      - index: A Seguir
        title: Maior rastreabilidade e governação.
        description: |
          • Matriz obrigação-evidência
          • Fluxos de aprovação e governação
          • Relatórios estruturados
          • Extração de metadados de artefactos
      - index: Para Além
        title: Conformidade integrada no desenvolvimento.
        description: |
          • Rastreabilidade obrigação-código
          • Camadas automáticas de validação de conformidade

  - title: Monitorizar e Auditar
    subtitle: Da gestão de evidência à inteligência contínua de conformidade.
    image:
      src: /assets/images/roadmap/monitor-and-audit.svg
      alt: Ilustração da secção sobre monitorização e auditoria
    roadmap:
      - index: Agora
        title: Gestão estruturada de evidência de conformidade.
        description: |
          • Registo de evidências
          • Pacotes de conformidade auditáveis exportáveis
          • Timestamping por entidades de certificação
      - index: A Seguir
        title: Maior robustez e credibilidade para auditoria.
        description: |
          • Lógica avançada de registo de auditoria
          • Agendamento de revisões periódicas
          • Registo externo de evidência
      - index: Para Além
        title: Inteligência contínua de conformidade.
        description: |
          • Planeamento de monitorização
          • Registo de desvios e investigações
          • Alertas automáticos
          • Declarações verificáveis de conformidade
          • Templates de testes alinhados com o AI Act
