title: Precisa de ajuda?
subtitle: Encontre aqui as respostas para as suas principais dúvidas.

faqs:
  - question: O que é o aiceblock e que problema resolve?
    answer: |
      O aiceblock é um sistema de gestão de conformidade em IA concebido para ajudar as organizações a estruturar, documentar e demonstrar conformidade com o Regulamento Europeu da Inteligência Artificial — AI Act. A plataforma apoia todo o ciclo de vida da IA, desde a classificação inicial de risco até à organização das evidências preparadas para auditoria. O aiceblock disponibiliza uma solução para organizar requisitos, acompanhar o progresso e manter evidências, garantindo que nada se perde ou fica por considerar. Esta abordagem responde a um desafio comum a muitas organizações, uma vez que, até agora, nenhuma outra solução oferecia uma forma abrangente e estruturada de gerir a conformidade ao longo do tempo.
  
  - question: Como é que o aiceblock apoia a conformidade com o AI Act?
    answer: |
      O aiceblock não certifica nem garante a conformidade, mas disponibiliza uma abordagem clara e faseada para orientar as organizações ao longo do processo de conformidade em IA. Ajuda a organizar informação, compreender os requisitos aplicáveis e documentar a abordagem seguida em três fases: <strong>Classificar e Enquadrar, Desenvolver e Implementar, e Monitorizar e Auditar</strong>.

  - question: Como são tratados os meus dados durante a avaliação de risco assistida por IA?
    answer: |
      O aiceblock utiliza funcionalidades assistidas por IA para apoiar a avaliação de risco, incluindo modelos de linguagem de terceiros, como os disponibilizados pela OpenAI. Quando estas funcionalidades são utilizadas, determinados dados introduzidos pelo utilizador podem ser processados por fornecedores externos, de acordo com as respetivas políticas de tratamento de dados. Contudo, o aiceblock acautela que estes dados não são utilizados para fins de treino. Ainda assim, as organizações devem evitar submeter informação sensível ou confidencial, salvo se estiverem confortáveis com a forma como essa informação poderá ser processada.

  - question: Como posso aceder ao aiceblock?
    answer: |
      Pode registar-se e começar a utilizar diretamente a versão experimental do aiceblock, que disponibiliza acesso às principais funcionalidades para gerir uma única solução de IA. As organizações interessadas em funcionalidades alargadas podem candidatar-se ao programa-piloto, concebido para quem pretende utilizar o aiceblock de forma mais estruturada e escalável. A versão piloto permite: 
      
      • Gerir múltiplas soluções de IA 
      • Aceder a funcionalidades adicionais 
      • Interagir de forma mais próxima com a equipa do aiceblock 
      
      A participação exige contacto direto e onboarding, mas não requer esforço de integração.

  - question: Quais são os principais passos na plataforma?
    answer: |
      O aiceblock segue um fluxo estruturado: 

      1. Registar e descrever a sua solução de IA 
      2. Avaliar o risco e identificar os requisitos aplicáveis 
      3. Documentar a abordagem seguida e carregar materiais de suporte 
      4. Organizar evidências e preparar a revisão interna ou externa 
      
      A plataforma apoia cada passo com orientação integrada e fluxos de trabalho estruturados. 
