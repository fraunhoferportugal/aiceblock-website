title: AICeBlock evolves as a modular system.
subtitle: The current MVP delivers core compliance management capabilities, while future modules progressively enhance automation, traceability, and auditability across the AI lifecycle.

cta_button:
  text: Discuss your AI use case
  url: /about?subject=0#contacts
  icon:
    src: /assets/images/icons/arrow-icon.svg
    alt: Arrow Icon

sections:
  - title: Scope & Risk
    subtitle: From structured classification to intelligent regulatory orchestration.
    image:
      src: /assets/images/roadmap/scope-and-risk.svg
      alt: Roadmap scope & risk section illustration
    roadmap:
      - index: Now
        title: Structured compliance-by-design documentation.
        description: |
          • Multi-solution registry
          • AI Act exposure determination
          • RAG-based risk classification
          • Rule-based classification engine
          • Role-based obligation mapping
          • Exportable Scope & Risk report
      - index: Next
        title: Increased determinism and regulatory robustness.
        description: |
          • Conditional obligation logic
          • Enhanced explanation transparency
          • Improved dependency mapping
          • Cross-regulation mapping (e.g., GDPR, sectoral frameworks)
      - index: Beyond
        title: Intelligent regulatory orchestration.
        description: |
          • Advanced mitigation planning
          • Organization-level compliance profiling
          • AI-assisted guidance through private/local LLM

  - title: Build & Implement
    subtitle: From structured documentation to development-integrated compliance.
    image:
      src: /assets/images/roadmap/build-and-implement.svg
      alt: Roadmap build & implement section illustration
    roadmap:
      - index: Now
        title: Structured compliance-by-design documentation.
        description: |
          • Obligation-level checklists
          • Annex IV, DPIA, FRIA templates
          • Document upload per obligation
          • Readiness/completion dashboard
      - index: Next
        title: Stronger traceability and governance.
        description: |
          • Obligation-to-evidence traceability matrix
          • Governance workflow and approval tracking
          • Advanced reporting and structured documentation
          • Metadata extraction from source artefacts
      - index: Beyond
        title: Development-integrated compliance.
        description: |
          • Obligation-to-code traceability
          • Automated compliance validation layers

  - title: Monitor & Audit
    subtitle: From evidence management to audit-ready compliance and continuous intelligence.
    image:
      src: /assets/images/roadmap/monitor-and-audit.svg
      alt: Roadmap monitor & audit section illustration
    roadmap:
      - index: Now
        title: Structured compliance evidence management.
        description: |
          • Evidence register
          • Exportable audit-ready compliance package 
          • Third-party certification authority timestamping
      - index: Next
        title: External credibility and audit strength.
        description: |
          • Enhanced audit trail logic
          • Periodic compliance review scheduler
          • Third-party evidence snapshot registry
      - index: Beyond
        title: Continuous compliance intelligence.
        description: |
          • Monitoring plan builder
          • Deviation logging and structured investigation records
          • Automated compliance alerts
          • Verifiable compliance statements
          • Pre-built AI Act aligned test templates
