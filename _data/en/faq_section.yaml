title: Do you need help?
subtitle: Find the answers to your main questions here.

faqs:
  - question: What is aiceblock and what problem does it solve?
    answer: |
      aiceblock is an AI compliance management platform designed to help organisations structure, document, and demonstrate compliance with the EU AI Act. It supports the full AI lifecycle — from initial risk classification to audit-ready evidence. aiceblock provides a  solution to organise requirements, track progress, and maintain evidence, ensuring nothing is lost or overlooked. This addresses a common challenge faced  by many organisations as until now no other solution has offered a comprehensive and structured way to manage compliance over time. 
  
  - question: How does aiceblock support AI Act compliance?
    answer: |
      aiceblock does not certify or guarantee compliance. It provides a clear, step-by-step framework to guide organisations through the AI compliance process. It helps you organise information, understand applicable requirements, and document your approach across three stages: <strong>Scope & Risk, Build & Implement, and Monitor & Audit</strong>.

  - question: How is my data handled during AI-assisted risk assessment?
    answer: |
      aiceblock uses AI-assisted features to support risk assessment, including the use of third-party large language models such as those from OpenAI. When these features are used, certain user-provided inputs may be processed by third-party providers in accordance with their own data-handling policies, but ensuring this data is never used for training purposes. Nonetheless, organisations should avoid submitting sensitive or confidential information unless they are comfortable with how it may be processed. 

  - question: How can I get access to aiceblock?
    answer: |
      You can register and start using the trial version of aiceblock directly. It provides access to core functionalities for managing a single AI solution. For organisations interested in extended capabilities, it is possible to apply to the pilot programme, designed for organisations looking to use aiceblock in a more structured and scalable way. The pilot programme allows: 

      • Managing multiple AI solutions 
      • Access to additional features 
      • Closer interaction with the aiceblock team 
      
      Participation requires direct contact and onboarding, but no integration effort is required.

  - question: What are the main steps on the platform?
    answer: |
      aiceblock follows a structured flow:

      1. Register and describe your AI solution
      2. Assess risk and identify applicable requirements
      3. Document your approach and upload supporting materials
      4. Organise evidence and prepare for internal or external review

      The platform supports each step with built-in guidance and structured workflows.
