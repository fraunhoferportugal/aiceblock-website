<section class="hero-section{% if include.first == 'true' %} header-space{% endif %}">
    <div class="content-wrapper">
        <div class="hero-section-text-content">
            <h1>{{ site.data[site.active_lang].hero_section.title }}</h1>
            <p>{{ site.data[site.active_lang].hero_section.description }}</p>
            <a href="{{ site.data[site.active_lang].hero_section.cta_button.url }}" class="cta-button">
                <span>{{ site.data[site.active_lang].hero_section.cta_button.text }}</span>
                <div class="cta-button-img-container">
                    <img src="{{ site.data[site.active_lang].hero_section.cta_button.icon.src }}"
                        alt="{{ site.data[site.active_lang].hero_section.cta_button.icon.alt }}">
                </div>
            </a>
        </div>
        {% include components/hero_carousel.html %}
        <div class="hero-mobile-button">
            <a href="{{ site.data[site.active_lang].hero_section.cta_button.url }}" class="cta-button">
                <span>{{ site.data[site.active_lang].hero_section.cta_button.text }}</span>
                <div class="cta-button-img-container">
                    <img src="{{ site.data[site.active_lang].hero_section.cta_button.icon.src }}"
                        alt="{{ site.data[site.active_lang].hero_section.cta_button.icon.alt }}">
                </div>
            </a>
        </div>
    </div>
</section>
